name: langprobe

# Phase 7 end-to-end stack. One `docker compose up` from a clean clone gets
# you Postgres + ClickHouse + Redis + the three Python services + the web UI.
#
# Service-discovery: every service uses container name DNS within the
# `langprobe` network. Host ports are exposed only for the web UI (7090),
# the api (7081), the ingest-api (7080), and the data plane (5432, 8123, 6379)
# so you can poke at them from your laptop. Workers are internal-only.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: langprobe
      POSTGRES_USER: langprobe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-langprobe}
    volumes:
      - pg-data:/var/lib/postgresql/data
      # /docker-entrypoint-initdb.d runs *.sql alphabetically on first boot only.
      - ../schemas/postgres/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langprobe -d langprobe"]
      interval: 3s
      timeout: 3s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: langprobe
      CLICKHOUSE_USER: langprobe
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-langprobe}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ch-data:/var/lib/clickhouse
      - ../schemas/clickhouse:/docker-entrypoint-initdb.d:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  ingest-api:
    build:
      context: ..
      dockerfile: services/ingest-api/Dockerfile
    environment:
      LANGPROBE_PG_DSN: postgres://langprobe:${POSTGRES_PASSWORD:-langprobe}@postgres:5432/langprobe
      LANGPROBE_REDIS_URL: redis://redis:6379/0
      LANGPROBE_DISK_BUFFER_PATH: /var/lib/langprobe/ingest-buffer
      LANGPROBE_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LANGPROBE_BIND_HOST: 0.0.0.0
      LANGPROBE_BIND_PORT: "7080"
    ports:
      - "7080:7080"
    volumes:
      - ingest-buffer:/var/lib/langprobe/ingest-buffer
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      LANGPROBE_PG_DSN: postgres://langprobe:${POSTGRES_PASSWORD:-langprobe}@postgres:5432/langprobe
      LANGPROBE_SESSION_SECRET: "${SESSION_SECRET:?must be set, generate with openssl rand -hex 32}"
      LANGPROBE_CLICKHOUSE_URL: http://langprobe:${CLICKHOUSE_PASSWORD:-langprobe}@clickhouse:8123/langprobe
      LANGPROBE_BIND_HOST: 0.0.0.0
      LANGPROBE_API_BIND_PORT: "7081"
      LANGPROBE_CORS_ALLOW_ORIGIN: ${WEB_ORIGIN:-http://localhost:7090}
      LANGPROBE_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LANGPROBE_WEB_BASE_URL: ${WEB_ORIGIN:-http://localhost:7090}
      # Public OAuth signup (Google + GitHub). All four are optional; if
      # the {provider}_CLIENT_ID + _CLIENT_SECRET pair is unset, that
      # provider's "Continue with X" button is hidden in the UI and
      # the start endpoint 503s. OAUTH_REDIRECT_BASE is the
      # externally-reachable origin of the api service (callback URL
      # the IdP receives is `<base>/v1/auth/oauth/<provider>/callback`).
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      # OAuth redirect points at the WEB origin so the cookie set by
      # the api can be relayed by the web's /api/auth/oauth/<provider>/callback
      # route handler back to the same origin the browser sees.
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-http://localhost:7090}
      # Circuit breaker for the LiteLLM dispatch gateway. Default
      # 'litellm'; set to 'legacy' to halt all gateway dispatches with
      # a 502 (used as an emergency switch — actual fix is a deploy
      # rollback).
      LLM_GATEWAY: ${LLM_GATEWAY:-litellm}
    ports:
      - "7081:7081"
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    restart: unless-stopped

  ingest-worker:
    build:
      context: ..
      dockerfile: services/ingest-worker/Dockerfile
    environment:
      LANGPROBE_REDIS_URL: redis://redis:6379/0
      LANGPROBE_CLICKHOUSE_URL: http://langprobe:${CLICKHOUSE_PASSWORD:-langprobe}@clickhouse:8123/langprobe
      LANGPROBE_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    environment:
      NODE_ENV: production
      # Public origin the browser hits.
      NEXT_PUBLIC_API_BASE: ${API_BASE:-http://localhost:7081}
      # Internal DNS the Next.js server uses for server-side fetch to /v1/*.
      API_BASE_INTERNAL: http://api:7081
    ports:
      - "7090:7090"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
  ch-data:
  redis-data:
  ingest-buffer:

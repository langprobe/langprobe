name: tracebility

# Phase 7 end-to-end stack. One `docker compose up` from a clean clone gets
# you Postgres + ClickHouse + Redis + the three Python services + the web UI.
#
# Service-discovery: every service uses container name DNS within the
# `tracebility` network. Host ports are exposed only for the web UI (7090),
# the api (7081), the ingest-api (7080), and the data plane (5432, 8123, 6379)
# so you can poke at them from your laptop. Workers are internal-only.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: tracebility
      POSTGRES_USER: tracebility
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracebility}
    volumes:
      - pg-data:/var/lib/postgresql/data
      # /docker-entrypoint-initdb.d runs *.sql alphabetically on first boot only.
      - ../schemas/postgres/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracebility -d tracebility"]
      interval: 3s
      timeout: 3s
      retries: 30

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: tracebility
      CLICKHOUSE_USER: tracebility
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-tracebility}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ch-data:/var/lib/clickhouse
      - ../schemas/clickhouse:/docker-entrypoint-initdb.d:ro
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8123/ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  ingest-api:
    build:
      context: ..
      dockerfile: services/ingest-api/Dockerfile
    environment:
      TRACEBILITY_PG_DSN: postgres://tracebility:${POSTGRES_PASSWORD:-tracebility}@postgres:5432/tracebility
      TRACEBILITY_REDIS_URL: redis://redis:6379/0
      TRACEBILITY_DISK_BUFFER_PATH: /var/lib/tracebility/ingest-buffer
      TRACEBILITY_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TRACEBILITY_BIND_HOST: 0.0.0.0
      TRACEBILITY_BIND_PORT: "7080"
    ports:
      - "7080:7080"
    volumes:
      - ingest-buffer:/var/lib/tracebility/ingest-buffer
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      TRACEBILITY_PG_DSN: postgres://tracebility:${POSTGRES_PASSWORD:-tracebility}@postgres:5432/tracebility
      TRACEBILITY_SESSION_SECRET: "${SESSION_SECRET:?must be set, generate with openssl rand -hex 32}"
      TRACEBILITY_CLICKHOUSE_URL: http://tracebility:${CLICKHOUSE_PASSWORD:-tracebility}@clickhouse:8123/tracebility
      TRACEBILITY_BIND_HOST: 0.0.0.0
      TRACEBILITY_API_BIND_PORT: "7081"
      TRACEBILITY_CORS_ALLOW_ORIGIN: ${WEB_ORIGIN:-http://localhost:7090}
      TRACEBILITY_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "7081:7081"
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    restart: unless-stopped

  ingest-worker:
    build:
      context: ..
      dockerfile: services/ingest-worker/Dockerfile
    environment:
      TRACEBILITY_REDIS_URL: redis://redis:6379/0
      TRACEBILITY_CLICKHOUSE_URL: http://tracebility:${CLICKHOUSE_PASSWORD:-tracebility}@clickhouse:8123/tracebility
      TRACEBILITY_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    environment:
      NODE_ENV: production
      # Public origin the browser hits.
      NEXT_PUBLIC_API_BASE: ${API_BASE:-http://localhost:7081}
      # Internal DNS the Next.js server uses for server-side fetch to /v1/*.
      API_BASE_INTERNAL: http://api:7081
    ports:
      - "7090:7090"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pg-data:
  ch-data:
  redis-data:
  ingest-buffer:

name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to latest main)"
        required: false

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: project-c4ff4ea3-775a-4e0c-9a3
  GCP_REGION: asia-southeast2
  GKE_CLUSTER: tracebility-cluster-1
  AR_HOST: asia-southeast2-docker.pkg.dev
  AR_REPO: tracebility
  K8S_NAMESPACE: tracebility
  HELM_RELEASE: tracebility

jobs:
  build-images:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: services/api/Dockerfile
          - service: ingest-api
            dockerfile: services/ingest-api/Dockerfile
          - service: ingest-worker
            dockerfile: services/ingest-worker/Dockerfile
          - service: web
            dockerfile: web/Dockerfile
          - service: migrator
            dockerfile: services/migrator/Dockerfile
    steps:
      - name: Resolve SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ matrix.service }}:${{ steps.sha.outputs.sha }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  helm-deploy:
    needs: build-images
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Resolve SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials "${{ env.GKE_CLUSTER }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm upgrade
        run: |
          helm upgrade --install "${{ env.HELM_RELEASE }}" deploy/helm/tracebility \
            --namespace "${{ env.K8S_NAMESPACE }}" \
            --create-namespace \
            --values deploy/helm/tracebility/values-gke.yaml \
            --set image.tag="${{ steps.sha.outputs.sha }}" \
            --atomic \
            --wait \
            --timeout 10m

      - name: Rollout status (sanity)
        run: |
          for d in api ingest-api ingest-worker web; do
            kubectl rollout status -n "${{ env.K8S_NAMESPACE }}" \
              "deployment/${{ env.HELM_RELEASE }}-${d}" --timeout=60s
          done

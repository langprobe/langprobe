[project]
name = "tracebility-langsmith-shim"
version = "0.0.1"
description = "Drop-in compat shim that lets LangSmith-style code (Client + traceable) post to a tracebility ingest host. Nominative fair use only; not affiliated with LangChain Inc."
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
authors = [{ name = "tracebility contributors" }]
keywords = ["llm", "observability", "tracing", "langsmith", "compat"]

dependencies = [
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tracebility_langsmith_shim"]

[project]
name = "tracebility-langchain"
version = "0.0.1"
description = "LangChain / LangGraph callback bridge for tracebility — emit traces from LangChain apps without a @traceable rewrite."
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "tracebility contributors" }]
keywords = ["llm", "observability", "tracing", "langchain", "langgraph", "tracebility"]

dependencies = [
    "tracebility>=0.0.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
    "langchain-core>=0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tracebility_langchain"]

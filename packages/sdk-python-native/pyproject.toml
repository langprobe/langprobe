[project]
name = "tracebility"
version = "0.0.1"
description = "Native Python SDK for tracebility — write traces, read runs/datasets/prompts/evals from the control-plane API."
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
authors = [{ name = "tracebility contributors" }]
keywords = ["llm", "observability", "tracing", "tracebility"]

dependencies = [
    "httpx>=0.25",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tracebility"]

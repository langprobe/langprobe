# Tracebility operator deployment.
#
# Deploys the operator into a cluster-wide service account so it can
# manage Deployments / Services / Ingress / PVCs in any namespace
# that hosts a Tracebility CR. Tighten the ClusterRole to specific
# namespaces if your security posture demands it.
---
apiVersion: v1
kind: Namespace
metadata:
  name: tracebility-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tracebility-operator
  namespace: tracebility-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tracebility-operator
rules:
  - apiGroups: ["tracebility.io"]
    resources: ["tracebilities", "tracebilities/status", "tracebilities/finalizers"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "events", "configmaps"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets"]
    # Operator only READS secrets to render env (reference, not copy).
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tracebility-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tracebility-operator
subjects:
  - kind: ServiceAccount
    name: tracebility-operator
    namespace: tracebility-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tracebility-operator
  namespace: tracebility-system
  labels:
    app.kubernetes.io/name: tracebility-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tracebility-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tracebility-operator
    spec:
      serviceAccountName: tracebility-operator
      containers:
        - name: operator
          image: ghcr.io/tracebility-ai/tracebility-operator:latest
          command: ["kopf", "run", "-A", "-m", "tracebility_operator.main", "--standalone"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

# Example Langprobe CR. Apply after the CRD + operator + the
# four secret references already exist in the namespace:
#
#   kubectl create secret generic langprobe-postgres \
#     --from-literal=dsn='postgres://user:pass@host:5432/langprobe'
#   kubectl create secret generic langprobe-clickhouse \
#     --from-literal=url='http://user:pass@host:8123/langprobe'
#   kubectl create secret generic langprobe-redis \
#     --from-literal=url='redis://host:6379/0'
#   kubectl create secret generic langprobe-session \
#     --from-literal=secret="$(openssl rand -hex 32)"
---
apiVersion: langprobe.io/v1alpha1
kind: Langprobe
metadata:
  name: prod
spec:
  image:
    registry: ghcr.io/langprobe
    tag: latest
  api:
    replicas: 2
    publicApiBase: https://api.example.com
  ingestApi:
    replicas: 2
  ingestWorker:
    replicas: 2
  web:
    replicas: 2
  secrets:
    postgres:   { name: langprobe-postgres,   key: dsn }
    clickhouse: { name: langprobe-clickhouse, key: url }
    redis:      { name: langprobe-redis,      key: url }
    session:    { name: langprobe-session,    key: secret }
  ingress:
    enabled: true
    className: nginx
    web:    { host: app.example.com }
    api:    { host: api.example.com }
    ingest: { host: ingest.example.com }
  logging:
    level: INFO

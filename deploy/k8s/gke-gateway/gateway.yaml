---
# Gateway API resource that fronts langprobe-web on the public internet.
# Uses GKE's gke-l7-global-external-managed gatewayClass which provisions
# a Google Cloud HTTP(S) Load Balancer behind the scenes. TLS terminates
# here using a cert from Certificate Manager (referenced by certmap name).
#
# Apply with: kubectl apply -n langprobe -f deploy/k8s/gke-gateway/
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: langprobe-web
  namespace: langprobe
  annotations:
    # Certificate Manager cert map. The map contains an entry for
    # langprobe.daz.co.in -> langprobe-web-cert, both created by
    # `gcloud certificate-manager` in the bootstrap runbook.
    networking.gke.io/certmap: langprobe-web-certmap
spec:
  gatewayClassName: gke-l7-global-external-managed
  # Bind to the global static IP reserved as
  # `gcloud compute addresses create langprobe-web-ip --global`.
  # NamedAddress is the GKE-specific value form for this gatewayClass.
  addresses:
    - type: NamedAddress
      value: langprobe-web-ip
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        kinds:
          - kind: HTTPRoute
    - name: https
      protocol: HTTPS
      port: 443
      allowedRoutes:
        kinds:
          - kind: HTTPRoute

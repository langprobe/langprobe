---
# Routes traffic for app.langprobe.com to the langprobe-web Service.
# Listed twice in parentRefs so both the HTTP and HTTPS listeners use the
# same backend (HTTPS terminates on the Gateway, HTTP just passes through).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: langprobe-web
  namespace: langprobe
spec:
  parentRefs:
    - name: langprobe-web
      sectionName: http
    - name: langprobe-web
      sectionName: https
  hostnames:
    - app.langprobe.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: langprobe-web
          port: 7090

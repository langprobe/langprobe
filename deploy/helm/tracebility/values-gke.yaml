# GKE-specific overrides for the tracebility chart.
# `image.tag` is supplied by the GitHub Actions workflow via `--set`,
# so this file alone is not enough to redeploy a specific version —
# pair it with `--set image.tag=<sha>`.

image:
  registry: asia-southeast2-docker.pkg.dev/project-c4ff4ea3-775a-4e0c-9a3/tracebility

# Per-service repository overrides: the parent chart defaults to
# `tracebility-<service>` (for ghcr.io). On Artifact Registry the AR
# repo path already segments by `/tracebility/`, so the per-service
# component is the bare service name. Final image:
#   <image.registry>/<service>:<image.tag>
api:
  image:
    repository: api
ingestApi:
  image:
    repository: ingest-api
ingestWorker:
  image:
    repository: ingest-worker
web:
  image:
    repository: web
  service:
    # Back to ClusterIP — public traffic now goes through the GCE Ingress
    # below, which fronts its own Google-managed load balancer + cert.
    type: ClusterIP
    port: 7090

postgres:
  existingSecret: tracebility-postgres
  existingSecretKey: dsn
clickhouse:
  existingSecret: tracebility-clickhouse
  existingSecretKey: url
redis:
  existingSecret: tracebility-redis
  existingSecretKey: url
session:
  existingSecret: tracebility-session
  existingSecretKey: secret

# Public routing is handled outside the chart by the Gateway API
# resources at deploy/k8s/gke-gateway/ (Gateway + HTTPRoute). The
# chart's Ingress template uses the legacy GCE Ingress controller,
# which is not present on this Autopilot cluster.
ingress:
  enabled: false

# OAuth signup. Both 'Continue with Google' and 'Continue with GitHub'
# show up on /login when the named secret has the matching keys.
# Operator creates the secret out-of-chart via the bootstrap runbook
# (docs/superpowers/runbooks/gke-bootstrap.md, "OAuth signup setup").
oauth:
  existingSecret: tracebility-oauth
  publicUrl: https://langprobe.daz.co.in

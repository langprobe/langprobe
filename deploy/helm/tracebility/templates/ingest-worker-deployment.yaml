{{- if .Values.ingestWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracebility.ingestWorker.fullname" . }}
  labels:
    {{- include "tracebility.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-worker
spec:
  replicas: {{ .Values.ingestWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "tracebility.ingestWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tracebility.ingestWorker.selectorLabels" . | nindent 8 }}
      {{- with .Values.ingestWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tracebility.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest-worker
          image: {{ include "tracebility.image" (dict "root" . "component" .Values.ingestWorker) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.image.pullPolicy }}
          env:
            - name: TRACEBILITY_LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.redis "name" "TRACEBILITY_REDIS_URL") | nindent 12 }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.clickhouse "name" "TRACEBILITY_CLICKHOUSE_URL") | nindent 12 }}
          resources:
            {{- toYaml .Values.ingestWorker.resources | nindent 12 }}
      {{- with .Values.ingestWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- if .Values.ingestApi.enabled }}
{{- if .Values.ingestApi.diskBuffer.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "tracebility.ingestApi.fullname" . }}-buffer
  labels:
    {{- include "tracebility.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-api
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.ingestApi.diskBuffer.size }}
  {{- with .Values.ingestApi.diskBuffer.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracebility.ingestApi.fullname" . }}
  labels:
    {{- include "tracebility.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-api
spec:
  replicas: {{ .Values.ingestApi.replicaCount }}
  # The disk-buffer PVC is RWO; with replicas > 1 we need separate PVCs
  # per replica via a StatefulSet, but the disk buffer is best-effort
  # (Redis is the source of truth for queued envelopes), so the
  # recreate strategy keeps cluster topology simpler at the cost of a
  # brief outage on rollout. Operators who want zero-downtime can flip
  # to RollingUpdate with podAntiAffinity rules below.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "tracebility.ingestApi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tracebility.ingestApi.selectorLabels" . | nindent 8 }}
      {{- with .Values.ingestApi.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tracebility.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest-api
          image: {{ include "tracebility.image" (dict "root" . "component" .Values.ingestApi) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ingestApi.service.port }}
          env:
            - name: TRACEBILITY_BIND_HOST
              value: "0.0.0.0"
            - name: TRACEBILITY_BIND_PORT
              value: "{{ .Values.ingestApi.service.port }}"
            - name: TRACEBILITY_LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: TRACEBILITY_DISK_BUFFER_PATH
              value: /var/lib/tracebility/ingest-buffer
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.postgres "name" "TRACEBILITY_PG_DSN") | nindent 12 }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.redis "name" "TRACEBILITY_REDIS_URL") | nindent 12 }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.clickhouse "name" "TRACEBILITY_CLICKHOUSE_URL") | nindent 12 }}
          {{- if .Values.ingestApi.diskBuffer.enabled }}
          volumeMounts:
            - name: ingest-buffer
              mountPath: /var/lib/tracebility/ingest-buffer
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ingestApi.resources | nindent 12 }}
      {{- if .Values.ingestApi.diskBuffer.enabled }}
      volumes:
        - name: ingest-buffer
          persistentVolumeClaim:
            claimName: {{ include "tracebility.ingestApi.fullname" . }}-buffer
      {{- end }}
      {{- with .Values.ingestApi.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestApi.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestApi.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracebility.ingestApi.fullname" . }}
  labels:
    {{- include "tracebility.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-api
spec:
  type: {{ .Values.ingestApi.service.type }}
  ports:
    - name: http
      port: {{ .Values.ingestApi.service.port }}
      targetPort: http
  selector:
    {{- include "tracebility.ingestApi.selectorLabels" . | nindent 4 }}
{{- end }}

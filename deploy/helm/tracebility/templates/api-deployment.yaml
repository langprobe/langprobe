{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tracebility.api.fullname" . }}
  labels:
    {{- include "tracebility.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "tracebility.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tracebility.api.selectorLabels" . | nindent 8 }}
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tracebility.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "tracebility.image" (dict "root" . "component" .Values.api) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          env:
            - name: TRACEBILITY_BIND_HOST
              value: "0.0.0.0"
            - name: TRACEBILITY_API_BIND_PORT
              value: "{{ .Values.api.service.port }}"
            - name: TRACEBILITY_LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.postgres "name" "TRACEBILITY_PG_DSN") | nindent 12 }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.clickhouse "name" "TRACEBILITY_CLICKHOUSE_URL") | nindent 12 }}
            {{- include "tracebility.envFromSecret" (dict "cfg" .Values.session "name" "TRACEBILITY_SESSION_SECRET") | nindent 12 }}
            {{- if .Values.oauth.existingSecret }}
            - name: OAUTH_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth.existingSecret }}
                  key: {{ .Values.oauth.googleClientIdKey }}
                  optional: true
            - name: OAUTH_GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth.existingSecret }}
                  key: {{ .Values.oauth.googleClientSecretKey }}
                  optional: true
            - name: OAUTH_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth.existingSecret }}
                  key: {{ .Values.oauth.githubClientIdKey }}
                  optional: true
            - name: OAUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth.existingSecret }}
                  key: {{ .Values.oauth.githubClientSecretKey }}
                  optional: true
            {{- end }}
            {{- with .Values.oauth.publicUrl }}
            - name: OAUTH_REDIRECT_BASE
              value: {{ . | quote }}
            - name: TRACEBILITY_WEB_BASE_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.web.publicApiBase }}
            - name: TRACEBILITY_CORS_ALLOW_ORIGIN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.api.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tracebility.api.fullname" . }}
  labels:
    {{- include "tracebility.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    {{- include "tracebility.api.selectorLabels" . | nindent 4 }}
{{- end }}

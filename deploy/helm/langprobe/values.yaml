## Default values for the langprobe Helm chart.
##
## Notes:
## - This chart deploys the four langprobe services (api, ingest-api,
##   ingest-worker, web). Stateful dependencies (Postgres, ClickHouse,
##   Redis) are referenced by URL via secrets you supply; the chart
##   does NOT bundle them. Why: production deployments almost always
##   want managed Postgres / managed ClickHouse, and bundling them in
##   the chart makes that strictly worse. For a dev-mode loop, run
##   the docker-compose stack instead.
## - Secrets ship via `existingSecret` references so the chart never
##   sees plaintext credentials. The expected shape is documented per
##   value below.
## - Image tags default to `latest`; pin a digest in production.
##
## Override in `--values prod.yaml` rather than editing this file.

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

image:
  registry: ghcr.io/langprobe
  pullPolicy: IfNotPresent
  tag: "latest"

api:
  enabled: true
  replicaCount: 2
  image:
    repository: langprobe-api
    tag: ""           # falls back to image.tag
  service:
    type: ClusterIP
    port: 7081
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env: []             # extra env vars; see _helpers.tpl for the canon set
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingestApi:
  enabled: true
  replicaCount: 2
  image:
    repository: langprobe-ingest-api
    tag: ""
  service:
    type: ClusterIP
    port: 7080
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  diskBuffer:
    enabled: true
    size: 5Gi
    storageClassName: ""    # cluster default if empty
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingestWorker:
  enabled: true
  replicaCount: 2
  image:
    repository: langprobe-ingest-worker
    tag: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

web:
  enabled: true
  replicaCount: 2
  image:
    repository: langprobe-web
    tag: ""
  service:
    type: ClusterIP
    port: 7090
  publicApiBase: ""          # browser-visible API URL, e.g. https://api.example.com
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Stateful dependencies — referenced by URL via secrets. Provide one of:
##   - existingSecret + a key name, OR
##   - inline value (NOT recommended for production)
## DO NOT enable both for the same field; the existingSecret wins.

postgres:
  ## Bearer DSN; postgres://USER:PASS@HOST:5432/DB
  existingSecret: ""
  existingSecretKey: "dsn"
  ## Inline only as escape hatch — leaks via Helm release manifests.
  inlineDsn: ""

clickhouse:
  ## URL; http://USER:PASS@HOST:8123/DB
  existingSecret: ""
  existingSecretKey: "url"
  inlineUrl: ""

redis:
  ## redis://HOST:6379/0
  existingSecret: ""
  existingSecretKey: "url"
  inlineUrl: ""

session:
  ## Required: Helm install fails if no secret resolves. The api
  ## service refuses to boot without a >=32-char session secret.
  existingSecret: ""
  existingSecretKey: "secret"
  inlineSecret: ""

## Browser-visible web ingress. The chart provisions Ingress for the
## web service and (optionally) the api service; ingest-api is usually
## fronted by the same external LB but with a separate hostname.

ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  hosts:
    web:
      host: ""
      paths:
        - path: /
          pathType: Prefix
    api:
      host: ""
      paths:
        - path: /
          pathType: Prefix
    ingest:
      host: ""
      paths:
        - path: /
          pathType: Prefix

## ServiceAccount + RBAC for read-only cluster lookups (k8s adapter
## not used in v1, but here so the next iteration doesn't need a
## chart bump).
serviceAccount:
  create: true
  name: ""
  annotations: {}

logging:
  level: INFO

## Public OAuth signup (Google + GitHub) for /login + /signup. Set
## `existingSecret` and `publicUrl` to enable; leave blank to hide
## the buttons. The four cred keys live in one Secret; each env var
## uses `optional: true`, so missing a provider's two keys just hides
## that one button. The Secret object itself must exist when
## `existingSecret` is set (Helm --atomic rolls back if not).
##
## Note on key-name field naming: this chart's convention elsewhere
## is a single `existingSecretKey`. We intentionally deviate here
## because all four creds live in one Secret — one field name per
## key. The api-deployment template emits four explicit secretKeyRef
## blocks; the `langprobe.envFromSecret` helper is not used.
oauth:
  # The publicly-reachable HTTPS origin of the web UI. Used by the API
  # both for the IdP callback URI (<publicUrl>/api/auth/oauth/<provider>/callback)
  # and as LANGPROBE_WEB_BASE_URL for relative redirects after login.
  # NOT a secret — goes in values directly.
  publicUrl: ""

  # Name of the k8s Secret holding the four OAuth credential values.
  existingSecret: ""

  # Key names within `existingSecret`. Defaults match docker-compose
  # (infra/docker-compose.yml) so dev + prod use the same names.
  googleClientIdKey: google_client_id
  googleClientSecretKey: google_client_secret
  githubClientIdKey: github_client_id
  githubClientSecretKey: github_client_secret

## Schema migration runner. Helm pre-upgrade Job that applies any
## unapplied Postgres + ClickHouse migrations before any Deployment
## rolls. Same image lifecycle as the four service images — built
## per-commit by deploy.yml with image.tag = SHA.
##
## To opt out (e.g. if you run migrations out-of-band), set enabled: false.
migrator:
  enabled: true
  image:
    repository: migrator
    tag: ""           # falls back to image.tag
  # Hard ceiling on Job runtime. The helm hook also has its own
  # timeout (`helm upgrade --timeout`), but bounding the Job itself
  # means kubectl reports the failure cleanly rather than waiting for
  # helm to give up.
  activeDeadlineSeconds: 300
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

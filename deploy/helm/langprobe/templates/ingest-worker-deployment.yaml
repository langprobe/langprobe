{{- if .Values.ingestWorker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "langprobe.ingestWorker.fullname" . }}
  labels:
    {{- include "langprobe.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-worker
spec:
  replicas: {{ .Values.ingestWorker.replicaCount }}
  # Recreate so a single-replica rollout doesn't need 2x capacity. The
  # worker is a Redis-stream consumer; redelivery on a brief outage is
  # already in the failure model (XACK after successful insert), so
  # killing the old pod before starting the new one is safe.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "langprobe.ingestWorker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "langprobe.ingestWorker.selectorLabels" . | nindent 8 }}
      {{- with .Values.ingestWorker.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "langprobe.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ingest-worker
          image: {{ include "langprobe.image" (dict "root" . "component" .Values.ingestWorker) }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.image.pullPolicy }}
          env:
            - name: LANGPROBE_LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- include "langprobe.envFromSecret" (dict "cfg" .Values.redis "name" "LANGPROBE_REDIS_URL") | nindent 12 }}
            {{- include "langprobe.envFromSecret" (dict "cfg" .Values.clickhouse "name" "LANGPROBE_CLICKHOUSE_URL") | nindent 12 }}
          resources:
            {{- toYaml .Values.ingestWorker.resources | nindent 12 }}
      {{- with .Values.ingestWorker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestWorker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ingestWorker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
